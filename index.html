<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBUKtCNUrnSvaCTC6OUa49SrhCJDHc-HgM",
    authDomain: "driving-log-e15fc.firebaseapp.com",
    projectId: "driving-log-e15fc",
    storageBucket: "driving-log-e15fc.firebasestorage.app",
    messagingSenderId: "459098205609",
    appId: "1:459098205609:web:130c4ae425dc3f8910e8b8",
    measurementId: "G-NHJDHXF17P"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family:Arial; padding:10px; }
button { padding:10px; margin:5px; }
input { padding:10px; width:100%; margin:5px 0; }
table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; padding:5px; text-align:center; }
</style>
</head>

<body>

<h2>운행일지</h2>

<!-- 입력 -->
<div>
  <input id="car" placeholder="차량">
  <input id="name" placeholder="이름">
  <input id="start" placeholder="출발지">
  <input id="end" placeholder="도착지">
  <input id="km" placeholder="km">
  <input id="note" placeholder="비고">
  <button onclick="save()">저장</button>
</div>

<hr>

<!-- 목록 -->
<button onclick="loadList()">목록 불러오기</button>
<div id="list"></div>

<script>

// 저장
async function save(){

  const data={
    car:car.value,
    name:name.value,
    start:start.value,
    end:end.value,
    km:km.value,
    note:note.value
  };

  if(!data.car || !data.name || !data.km){
    alert("필수 입력");
    return;
  }

  const today = new Date().toISOString().split("T")[0];

  if(window.editId){

    await db.collection("driveLogs").doc(window.editId).update({
      ...data,
      km:Number(data.km)
    });

    window.editId = null;

  }else{

    await db.collection("driveLogs").add({
      date:today,
      ...data,
      km:Number(data.km)
    });

  }

  alert("완료");
  loadList();
}

// 목록
async function loadList(){

  const snapshot = await db.collection("driveLogs")
    .orderBy("date","desc")
    .get();

  let html = "<table><tr><th>날짜</th><th>차량</th><th>이름</th><th>km</th><th>관리</th></tr>";

  snapshot.forEach(doc=>{
    const d = doc.data();

    html += `
    <tr>
      <td>${d.date}</td>
      <td>${d.car}</td>
      <td>${d.name}</td>
      <td>${d.km}</td>
      <td>
        <button onclick="edit('${doc.id}')">수정</button>
        <button onclick="del('${doc.id}')">삭제</button>
      </td>
    </tr>`;
  });

  html += "</table>";
  list.innerHTML = html;
}

// 수정
async function edit(id){

  const doc = await db.collection("driveLogs").doc(id).get();
  const d = doc.data();

  car.value = d.car;
  name.value = d.name;
  start.value = d.start;
  end.value = d.end;
  km.value = d.km;
  note.value = d.note;

  window.editId = id;
}

// 삭제
async function del(id){

  if(!confirm("삭제?")) return;

  await db.collection("driveLogs").doc(id).delete();

  alert("삭제됨");
  loadList();
}

</script>

</body>
</html>
