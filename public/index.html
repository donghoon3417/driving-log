<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>운행관리</h2>

    <!-- 탭 -->
    <div class="tabs">
      <button id="tabWrite" class="active" onclick="showPage('write')">
        운행일지
      </button>
      <button id="tabHistory" onclick="showPage('history')">운행이력</button>
    </div>

    <!-- 입력 -->
    <div id="pageWrite">
      <div id="carSection">
        <h4>🚗 차량 선택</h4>
        <button onclick="selectCar(this, '니로1')">니로 5653</button>
        <button onclick="selectCar(this, '니로2')">니로 5572</button>
        <button onclick="selectCar(this, '니로3')">니로 6785</button>
        <button onclick="selectCar(this, 'EV3 [40거 3247]')">EV3 3247</button>
        <button onclick="selectCar(this,'아이오닉9 [41너 1060]')">아이오닉9</button>
        </button>
      </div>

      <div id="nameSection">
        <h4>👤 운행자</h4>
        <button onclick="selectName(this, '김동훈')">김동훈</button>
        <button onclick="selectName(this, '임정근')">임정근</button>
        <button onclick="selectName(this, '문진기')">문진기</button>
      </div>

      <div>
        <input id="start" placeholder="출발지" />
        <input id="end" placeholder="도착지" />
        <input id="km" type="number" placeholder="km" />
        <input id="note" placeholder="비고" />
        <button onclick="save()">저장</button>
      </div>
    </div>

    <!-- 이력 -->
    <div id="pageHistory" style="display: none">
      <div style="margin: 10px 0">
        <input type="date" id="startDate" />
        <input type="date" id="endDate" />
        <button onclick="filterByDate()">조회</button>
        <button onclick="printFiltered()">🖨 기간 인쇄</button>
      </div>
      <button onclick="loadList()">새로고침</button>
      <button onclick="printAll()">🖨 전체 인쇄</button>

      <div id="printArea">
        <div id="list"></div>
      </div>
    </div>

    <!-- ✅ main.js 연결 -->
    <script src="main.js"></script>
  </body>
</html>
