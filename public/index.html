<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>운행관리</h2>

    <!-- 탭 -->
    <div class="tabs">
      <button id="tabWrite" class="active" onclick="showPage('write')">
        운행일지
      </button>
      <button id="tabHistory" onclick="showPage('history')">운행이력</button>
    </div>

    <!-- 입력 -->
    <div id="pageWrite">
      <div id="carSection">
        <div class="section-title">🚗 차량 선택</div>
        <div class="button-grid">
          <button onclick="selectCar(this, '니로1 [33구 5653]')">
            니로 5653
          </button>
          <button onclick="selectCar(this, '니로2 [33구 5572]')">
            니로 5572
          </button>
          <button onclick="selectCar(this, '니로3 [63거 6785]')">
            니로 6785
          </button>
          <button onclick="selectCar(this, 'EV3 [40거 3247]')">EV3 3247</button>
          <button onclick="selectCar(this, '아이오닉9 [41너 1060]')">
            아이오닉9
          </button>
          <button onclick="selectCar(this, '스타리아1 [815서 1036]')">
            스타 1036
          </button>
          <button onclick="selectCar(this, '스타리아2 [80더 4356]')">
            스타 4356
          </button>
          <button onclick="selectCar(this, '윙(리프트) [84루 0891]')">
            윙 0891
          </button>

          <button onclick="selectCar(this, 'BYD 윙바디1 [97러 2092]')">
            BYD2092
          </button>
          <button onclick="selectCar(this, 'BYD 윙바디2 [97러 1951]')">
            BYD1951
          </button>

          <button onclick="selectCar(this, '스타리아3 [95더 5318]')">
            스타 5318
          </button>
          <button onclick="selectCar(this, '스타리아4 [95더 5342]')">
            스타 5342
          </button>
        </div>
      </div>
      <div id="nameSection">
        <div class="section-title">👤 운행자</div>
        <div class="button-grid">
          <button onclick="selectName(this, '김동훈')">김동훈</button>
          <button onclick="selectName(this, '임정근')">임정근</button>
          <button onclick="selectName(this, '문진기')">문진기</button>
          <button onclick="selectName(this, '김대균')">김대균</button>
          <button onclick="selectName(this, '김윤배')">김윤배</button>
          <button onclick="selectName(this, '김승국')">김승국</button>
          <button onclick="selectName(this, '여승걸')">여승걸</button>
          <button onclick="selectName(this, '노정환')">노정환</button>
          <button onclick="selectName(this, '박영진')">박영진</button>
          <button onclick="selectName(this, '장대성')">장대성</button>
          <button onclick="selectName(this, '이기로')">이기로</button>
          <button onclick="selectName(this, '서덕원')">서덕원</button>
          <button onclick="selectName(this, '이현명')">이현명</button>
          <button onclick="selectName(this, '이선우')">이선우</button>
          <button onclick="selectName(this, '최인혁')">최인혁</button>
          <button onclick="selectName(this, '이경준')">이경준</button>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; align-items: center">
        <input id="date" type="date" />
        <input id="start" placeholder="출발지" />
        <input id="end" placeholder="도착지" />
        <input id="km" type="number" placeholder="km" />
        <input id="note" placeholder="비고" />
        <button onclick="save()">저장</button>
      </div>
    </div>

    <!-- 이력 -->
    <div id="pageHistory" style="display: none">
      <div class="date-row">
        <input type="date" id="startDate" />
        <span>~</span>
        <input type="date" id="endDate" />
        <button onclick="filterByDate()">조회</button>
        <button onclick="printFiltered()">🖨 기간 인쇄</button>
      </div>

      <div id="printArea">
        <div id="list"></div>
      </div>
    </div>

    <!-- ✅ main.js 연결 -->
    <script src="main.js"></script>
    <script src="filter.js"></script>
    <script src="ui.js"></script>
  </body>
</html>
