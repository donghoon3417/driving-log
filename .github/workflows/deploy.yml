name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Node 설치
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Firebase CLI 설치
        run: npm install -g firebase-tools

      - name: Firebase 배포
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}"
